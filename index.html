*POWER WITH GOD–FAVOUR WITH MAN*

*🗓 SUNDAY, MARCH 1, 2026*

*Subtitle:* The Night of Transformation

*Focus Text:* Genesis 32:22–32

*Reflections*
Power with God does not begin on platforms—it begins in lonely places. Jacob’s encounter happened at Jabbok, in the dark, separated from family, wealth, and comfort. Before God can trust a man with public influence, He brings him into private wrestling. Jacob had strategy, intelligence, and resources—but he lacked brokenness. That night, God reduced him to dependence. The wrestling was not merely physical; it was spiritual confrontation. It was the death of self-reliance and the birth of covenant reliance. The struggle lasted until daybreak. Transformation takes time.

Many believers desire victory, but few endure the wrestling. Yet every sustained anointing is born in a night season. The night of confusion becomes the morning of clarity. The place of struggle becomes the place of renaming. True power with God is not noise; it is intimacy. It is the authority that comes from refusing to release His presence until He blesses you. 

*Ancient Biblical Example* 
Jacob’s name meant _“supplanter”_—one who strives in human strength. But after wrestling, God renamed him Israel—_“Prince with God.”_ This was not cosmetic change; it was covenant transformation. His limp became a reminder that power is sustained through dependence.

*Testimony*
Believers testify that their greatest spiritual growth followed seasons of deep consecration—periods of tears, fasting, prayer vigils, and surrender.

• Marriages restored after prayer nights.
• Ministries reborn after seasons of hidden intercession.
• Personal clarity received after wrestling through doubt.

Many confess that the night seasons they once resented became the turning points of their destiny. The wrestling produced spiritual muscle, resilience, and divine favor.

3. James 4:8 – _“Draw near to God and He will draw near to you.”_
4. Jeremiah 29:13 – _“You will seek Me and find Me when you search for Me with all your heart.”_

These scriptures reveal a pattern: seeking precedes finding; wrestling precedes renaming; brokenness precedes authority.

*Prayer*
• Father, bring me into a life-changing encounter that secures power with You.
• Strip away self-dependence and pride.

*Subtitle:* Wrestling Through the Dark

*Focus Text:* Genesis 32:22–32

*Reflections*
Dark seasons are not always signs of defeat; many times they are signs of divine appointment. The night in Jacob’s story was not accidental—it was intentional. God often schedules encounters when there is less noise, fewer distractions, and no audience to impress. The dark represents the realm where feelings can fail you. In darkness you cannot _“see”_ your progress, yet God is still working. This is where endurance is forged. Many people quit prayer because they cannot immediately sense God, but spiritual authority is built when you continue even when you cannot feel. Jacob wrestled _“until the breaking of day.”_ That means he had to survive hours of uncertainty. In the dark, the mind begins to question: Is anything happening? Am I wasting time? Why is this so hard? Yet Jacob did not measure the encounter by comfort—he measured it by outcome. He stayed until the day broke. Loneliness is also a tool in God’s hand. God sometimes separates you so He can settle you. When Jacob was _“left alone,”_ he was not abandoned; he was prepared.

*Ancient Biblical Example*
Jacob’s loneliness at Jabbok became his turning point. No wife could wrestle for him. No servant could intercede on his behalf. No friend could carry that spiritual burden. Some battles are designed to force personal consecration.

In Scripture, the pattern is consistent:
• Moses met God in the wilderness.
• Elijah heard God in a cave.
• Jesus prayed alone in Gethsemane.
• Paul was processed in Arabia and prison seasons.

The dark is often God’s classroom for those He will trust with influence.

*Testimony* 
Believers testify that their most decisive breakthroughs did not come during easy days, but during seasons when prayer felt like labor. 

Many have said:
• _“I prayed when nobody clapped.”_
• _“I cried before God when nobody noticed.”_
• _“I pressed through dryness and confusion, and suddenly clarity came.”_

Some testify that after weeks or months of _“silent”_ nights, a single encounter shifted their spiritual life—discipline was restored, sinful habits lost power, wisdom increased, doors opened, and strongholds broke.

The testimony of endurance is this: darkness never wins against persistence. When you refuse to quit, the night must eventually produce a morning.

*Scriptures*
1. Genesis 32:24 – Jacob was left alone and wrestled till daybreak.
2. Psalm 42:8 – _“In the night His song shall be with me—a prayer…”_
3. Isaiah 50:10 – When you walk in darkness, trust in the name of the Lord.
4. Luke 18:1 – Men ought always to pray and not lose heart.

These scriptures teach that darkness is not the end—it is the environment where trust, endurance, and spiritual stamina are proven.

*Prayer*

7. Every midnight arrow assigned against my destiny—backfire now.

9. I receive grace to outlast the night and see the breaking of day.
10. By endurance, I take my place among those who prevail with God.

*Declaration*

• I do not quit in the dark—I press until daybreak.
• My lonely seasons are not punishment; they are preparation.
• I receive supernatural stamina and spiritual endurance.
• My midnight prayers will birth mighty testimonies.
• I wrestle, I persist, and I prevail—with God!

3. Psalm 126:5 – _“Those who sow in tears shall reap in joy.”_
4. 2 Kings 20:5 – _“I have heard your prayer, I have seen your tears.”_

        const devotionalList = document.getElementById('devotionalList');
        const currentDateSpan = document.getElementById('currentDate');

        // Initial Setup
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        currentDateSpan.textContent = now.toLocaleDateString('en-US', options);

        function cleanText(text) {
            // Remove the specific moon phase block
            let cleaned = text.replace(/⟨[\s\S]*?⟩/g, '');
            // Remove the backslashes that were added before asterisks
            cleaned = cleaned.replace(/\\\*/g, '*');
             // Remove extra backslashes before hyphens if any (some parsers do this)
            cleaned = cleaned.replace(/\\-/g, '-');
            return cleaned;
        }

        function parseDevotionals(text) {
            const clean = cleanText(text);
            // Split by the specific header used for each day
            // We look for "*🔰 STRATEGIC LEVEL PRAYER JOURNAL*"
            const parts = clean.split('*🔰 STRATEGIC LEVEL PRAYER JOURNAL*');
            
            // Filter out empty parts and map to objects
            return parts.filter(p => p.trim().length > 0).map((part, index) => {
                const lines = part.trim().split('\n');
                // Extract Date
                // Look for line starting with *🗓
                const dateLine = lines.find(l => l.includes('*🗓'));
                let dateDisplay = `Day ${index + 1}`;
                if (dateLine) {
                    dateDisplay = dateLine.replace(/\*/g, '').replace('🗓', '').trim();
                }

                return {
                    id: index + 1,
                    date: dateDisplay,
                    fullText: `*🔰 STRATEGIC LEVEL PRAYER JOURNAL*\n\n${part.trim()}`
                };
            });
        }

        function renderDevotionals() {
            const devotionals = parseDevotionals(rawDevotionalText);

            devotionals.forEach(dev => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow";
                
                // Create preview text (first few lines)
                const previewLines = dev.fullText.split('\n').slice(0, 6).join('\n');

                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="flex-1">
                            <h2 class="text-lg font-bold text-gray-800">${dev.date}</h2>
                            <div class="text-sm text-gray-500 mt-1 whitespace-pre-wrap line-clamp-2">${previewLines}...</div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="copyToClipboard(${dev.id})" class="flex-1 md:flex-none px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 font-medium transition-colors text-sm">
                                <i class="fas fa-copy mr-2"></i>Copy
                            </button>
                            <button onclick="shareToWhatsApp(${dev.id})" class="flex-1 md:flex-none px-4 py-2 whatsapp-green text-white rounded hover:bg-opacity-90 font-medium transition-colors text-sm flex items-center justify-center">
                                <i class="fab fa-whatsapp mr-2"></i>Send on WhatsApp
                            </button>
                        </div>
                    </div>
                `;
                devotionalList.appendChild(card);
            });
        }

        // Store parsed data globally for button access
        let parsedData = [];

        function init() {
            parsedData = parseDevotionals(rawDevotionalText);
            renderDevotionals();
        }

        window.shareToWhatsApp = function(id) {
            const item = parsedData.find(d => d.id === id);
            if (!item) return;
            
            // Encode the text for URL
            const encodedText = encodeURIComponent(item.fullText);
            const url = `https://wa.me/?text=${encodedText}`;
            
            // Open in new tab
            window.open(url, '_blank');
        }

        window.copyToClipboard = function(id) {
            const item = parsedData.find(d => d.id === id);
            if (!item) return;

            // Fallback for iframe environments where navigator.clipboard might be blocked
            const textArea = document.createElement("textarea");
            textArea.value = item.fullText;
            
            // Ensure it's not visible but part of the DOM
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    alert('Copied to clipboard!');
                } else {
                    console.error('Fallback: Copying text command was unsuccessful');
                    alert('Unable to copy automatically. Please select text manually.');
                }
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
                alert('Unable to copy automatically. Please select text manually.');
            }

            document.body.removeChild(textArea);
        }

        init();
    </script>
